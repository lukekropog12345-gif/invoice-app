<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — InvoiceFlow</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:12px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .logo{font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-bottom:1.5rem;text-align:center}
  .logo span{color:#1a6b3c}
  h2{font-size:22px;font-weight:600;margin-bottom:0.5rem}
  p{font-size:13px;color:#888;margin-bottom:1.5rem}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  label{font-size:11px;color:#888}
  input{padding:9px 12px;font-size:14px;border:1px solid #e0e0dc;border-radius:8px;background:#fafaf8;outline:none;transition:border-color 0.15s}
  input:focus{border-color:#1a6b3c}
  .btn{width:100%;padding:11px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;transition:background 0.15s}
  .btn:hover{background:#1a6b3c}
  .link{text-align:center;margin-top:1rem;font-size:13px;color:#888}
  .link a{color:#1a6b3c;text-decoration:none;font-weight:500}
  .flash{background:#fff3f3;border:1px solid #fcc;color:#c00;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Invoice<span>Flow</span></div>
  <h2>Create your account</h2>
  <p>Free forever — no credit card needed</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@email.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required>
    </div>
    <button type="submit" class="btn">Create free account</button>
  </form>
  <div class="link">Already have an account? <a href="/login">Log in</a></div>
</div>
</body>
</html>
